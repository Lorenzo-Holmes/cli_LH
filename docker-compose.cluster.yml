services:
  cli_LH:
    image: ${CLI_PROXY_IMAGE:-eceasy/cli_LH:latest}
    pull_policy: always
    build:
      context: .
      dockerfile: Dockerfile
      args:
        VERSION: ${VERSION:-dev}
        COMMIT: ${COMMIT:-none}
        BUILD_DATE: ${BUILD_DATE:-unknown}
    container_name: cli_LH-cluster
    environment:
      HOME_JWT: ${HOME_JWT:-}
    ports:
      - "8317:8317"
    volumes:
      - ./home:/root/.cli_LH
      - ./logs:/cli_LH/logs
    command: >
      sh -eu -c '
        if [ -z "$$HOME_JWT" ]; then
          echo "HOME_JWT is required" >&2
          exit 1
        fi

        exec ./cli_LH -home-jwt "$$HOME_JWT"
      '
    restart: unless-stopped