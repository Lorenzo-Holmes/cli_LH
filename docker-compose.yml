services:
  cli_LH:
    image: ${CLI_PROXY_IMAGE:-eceasy/cli_LH:latest}
    pull_policy: always
    build:
      context: .
      dockerfile: Dockerfile
      args:
        VERSION: ${VERSION:-dev}
        COMMIT: ${COMMIT:-none}
        BUILD_DATE: ${BUILD_DATE:-unknown}
    container_name: cli_LH
    # env_file:
    #   - .env
    environment:
      DEPLOY: ${DEPLOY:-}
    ports:
      - "8317:8317"
      - "8085:8085"
      - "1455:1455"
      - "54545:54545"
      - "51121:51121"
      - "11451:11451"
    volumes:
      - ${CLI_PROXY_CONFIG_PATH:-./config.yaml}:/cli_LH/config.yaml
      - ${CLI_PROXY_AUTH_PATH:-./auths}:/root/.cli_LH
      - ${CLI_PROXY_LOG_PATH:-./logs}:/cli_LH/logs
    restart: unless-stopped
