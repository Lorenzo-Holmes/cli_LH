name: desktop-check

on:
  pull_request:
    paths:
      - 'desktop/**'
      - '.github/workflows/desktop-check.yml'
  push:
    branches:
      - main
    paths:
      - 'desktop/**'
      - '.github/workflows/desktop-check.yml'

permissions:
  contents: read

jobs:
  desktop:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: desktop/package-lock.json

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install Linux Tauri dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgtk-3-dev \
            libwebkit2gtk-4.1-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev

      - name: Install desktop dependencies
        working-directory: desktop
        run: npm ci

      - name: Typecheck desktop frontend
        working-directory: desktop
        run: npm run typecheck

      - name: Build desktop frontend
        working-directory: desktop
        run: npm run build

      - name: Check Tauri backend
        working-directory: desktop
        run: npm run tauri:check
