name: desktop-release

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

permissions:
  contents: read

jobs:
  windows-desktop:
    name: Windows desktop bundle
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: desktop/package-lock.json

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Install desktop dependencies
        working-directory: desktop
        run: npm ci

      - name: Prepare Go sidecar
        run: npm --prefix desktop run prepare:sidecar

      - name: Typecheck desktop frontend
        working-directory: desktop
        run: npm run typecheck

      - name: Build desktop frontend
        working-directory: desktop
        run: npm run build

      - name: Build Tauri bundle
        working-directory: desktop
        run: npm run tauri -- build

      - name: Upload desktop bundle artifacts
        uses: actions/upload-artifact@v4
        with:
          name: cli-lh-cockpit-windows
          path: |
            desktop/src-tauri/target/release/bundle/**/*.exe
            desktop/src-tauri/target/release/bundle/**/*.nsis.zip
          if-no-files-found: error
